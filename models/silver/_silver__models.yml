version: 2

# Silver: one schema per area — customer, sales, purchasing, geography (ADR-11).
# Models use plain names (`lineitem`, `customer`); the schema name carries the
# layer. Heavier tests than Bronze. Generic test args: `arguments:` (dbt 1.10+).

models:

  # ---------------------------------------------------------------------------
  # silver_customer
  # ---------------------------------------------------------------------------
  - name: customer
    description: >
      `silver_customer.customer` from `snap_customer_scd2` — SCD2 rows with
      valid_from / valid_to. `is_current = true` for current row; as-of joins use the date range.
    config:
      tags: ['silver', 'customer']
    columns:
      - name: customer_id
        description: "Natural key. NOT unique across SCD versions — unique within (customer_id, is_current=true)."
        tests:
          - not_null
      - name: scd_version_id
        description: "Surrogate SCD version key. Unique per row."
        tests:
          - unique
          - not_null
      - name: market_segment
        description: "Customer market segment. SCD-tracked."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'HOUSEHOLD', 'MACHINERY']
      - name: nation_id
        description: "FK to silver_geography.nation."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('nation')
                field: nation_id
      - name: valid_from
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

    tests:
      # Unique on (customer_id, is_current=true) — there must be exactly
      # one current version of each customer.
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_id
              - is_current
          config:
            where: "is_current = true"

  # ---------------------------------------------------------------------------
  # silver_sales
  # ---------------------------------------------------------------------------
  - name: orders
    description: "silver_sales.orders — types cleaned up, date parts added for join keys."
    config:
      tags: ['silver', 'sales', 'orders']
    columns:
      - name: order_id
        description: "Natural key."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "FK to silver_customer.customer."
        tests:
          - not_null
          # Relationship is to the CURRENT version of customer.
          # Historical integrity is preserved through the SCD2 valid_from/to join.
          - relationships:
              arguments:
                to: ref('customer')
                field: customer_id
              config:
                where: "customer_id is not null"
      - name: order_status_code
        tests:
          - accepted_values:
              arguments:
                values: ['F', 'O', 'P']
      - name: order_total_price
        tests:
          - positive_value
      - name: order_date
        tests:
          - not_null
      - name: order_priority
        tests:
          - accepted_values:
              arguments:
                values: ['1-URGENT', '2-HIGH', '3-MEDIUM', '4-NOT SPECIFIED', '5-LOW']

  - name: lineitem
    description: >
      `silver_sales.lineitem` at (order_id, line_number) grain. `net_revenue`
      and discount/tax $ computed here; feeds `fct_sales_lineitem`.
    config:
      tags: ['silver', 'sales', 'lineitem', 'tier_1']
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('orders')
                field: order_id
      - name: line_number
        tests:
          - not_null
      - name: part_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('part')
                field: part_id
      - name: supplier_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('supplier')
                field: supplier_id
      - name: quantity
        description: "Quantity ordered. Must be positive."
        tests:
          - positive_value
      - name: extended_price
        description: "Pre-discount line revenue. Must be positive."
        tests:
          - positive_value
      - name: discount_rate
        description: "Discount rate. TPC-H contract: [0, 0.10]."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: tax_rate
        description: "Tax rate. TPC-H contract: [0, 0.08]."
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "between 0 and 1"
      - name: net_revenue
        description: "Silver-computed: extended_price - discount_amount (after each rounded to cents) so the two sum to list."
        tests:
          - positive_value
      - name: discount_amount
        description: "Silver-computed: extended_price * discount_rate."
        tests:
          - positive_value:
              arguments:
                allow_zero: true
      - name: tax_amount
        description: "Silver-computed: extended_price * tax_rate."
        tests:
          - positive_value:
              arguments:
                allow_zero: true

    tests:
      # Composite uniqueness at the lineitem grain
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - line_number
      # Business rule: net_revenue must equal extended_price - discount_amount
      # within floating-point tolerance. Catches computation drift if the
      # formula ever gets re-implemented inconsistently.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "abs(net_revenue - (extended_price - discount_amount)) < 0.02"
          config:
            severity: warn

  # ---------------------------------------------------------------------------
  # silver_purchasing
  # ---------------------------------------------------------------------------
  - name: part
    description: "silver_purchasing.part — business-friendly names, brand string normalized."
    config:
      tags: ['silver', 'purchasing', 'part']
    columns:
      - name: part_id
        tests:
          - unique
          - not_null
      - name: brand
        tests:
          - not_null
      - name: retail_price
        tests:
          - positive_value

  - name: supplier
    description: "silver_purchasing.supplier; nation_id kept for dim_supplier in Gold."
    config:
      tags: ['silver', 'purchasing', 'supplier']
    columns:
      - name: supplier_id
        tests:
          - unique
          - not_null
      - name: nation_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('nation')
                field: nation_id

  - name: partsupp
    description: >
      `silver_purchasing.partsupp`. `supply_cost_per_unit` is the per-unit
      cost TPC-H gives you, used in Gold for margin.
    config:
      tags: ['silver', 'purchasing', 'partsupp']
    columns:
      - name: part_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('part')
                field: part_id
      - name: supplier_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('supplier')
                field: supplier_id
      - name: supply_cost_per_unit
        tests:
          - positive_value:
              arguments:
                allow_zero: true

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - part_id
              - supplier_id

  # ---------------------------------------------------------------------------
  # silver_geography
  # ---------------------------------------------------------------------------
  - name: nation
    description: "silver_geography.nation — small reference table, FK to region."
    config:
      tags: ['silver', 'geography', 'nation', 'reference']
    columns:
      - name: nation_id
        tests:
          - unique
          - not_null
      - name: nation_name
        tests:
          - unique
          - not_null
      - name: region_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('region')
                field: region_id

  - name: region
    description: "silver_geography.region — five regions at SF1."
    config:
      tags: ['silver', 'geography', 'region', 'reference']
    columns:
      - name: region_id
        tests:
          - unique
          - not_null
      - name: region_name
        tests:
          - unique
          - not_null
