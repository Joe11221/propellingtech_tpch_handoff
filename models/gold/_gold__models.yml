version: 2

# Gold: stricter on analytics than Silver; hygiene lives below. Dims: PK checks;
# fact: FKs to dims; non-negative $ where that matters; `gross_margin` can be
# negative on purpose. Singular rec test in tests/singular/.

models:

  # ---------------------------------------------------------------------------
  - name: dim_date
    description: >
      One row per calendar day (1990–2000) from dbt_utils.date_spine.
    config:
      tags: ['gold', 'dimension', 'conformed']
    columns:
      - name: date_key
        description: "YYYYMMDD integer surrogate. Primary key."
        tests:
          - unique
          - not_null
      - name: date_value
        tests:
          - unique
          - not_null
      - name: year_number
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  - name: dim_geography
    description: "Nation and region; same dim for ship-side and bill-side keys on the fact."
    config:
      tags: ['gold', 'dimension', 'conformed']
    columns:
      - name: geography_key
        tests:
          - unique
          - not_null
      - name: nation_id
        tests:
          - unique
          - not_null
      - name: nation_name
        tests:
          - not_null
      - name: region_id
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  - name: dim_customer
    description: >
      SCD Type 2 customer dimension. customer_key is unique per VERSION;
      customer_id is the stable natural key. Use valid_from/valid_to for
      point-in-time joins from the fact table.
    config:
      tags: ['gold', 'dimension', 'scd2', 'customer']
    columns:
      - name: customer_key
        description: "Surrogate key per SCD2 version. Primary key."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Natural key. NOT unique across versions."
        tests:
          - not_null
      - name: market_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['AUTOMOBILE', 'BUILDING', 'FURNITURE', 'HOUSEHOLD', 'MACHINERY']
      - name: customer_tier
        description: >
          Gold-derived. 'Watch' for negative current balance; 'Strategic' /
          'Growth' / 'Maintain' for positive balances bucketed by tercile(desc);
          'Lapsed' when the customer has no current version at all.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Strategic', 'Growth', 'Maintain', 'Watch', 'Lapsed']
      - name: nation_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_geography')
                field: nation_id
      - name: valid_from
        tests:
          - not_null
      - name: is_current
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - customer_id
              - is_current
          config:
            where: "is_current = true"

  # ---------------------------------------------------------------------------
  - name: dim_supplier
    description: "SCD Type 1 supplier dimension. Denormalized with nation + region."
    config:
      tags: ['gold', 'dimension', 'scd1', 'supplier']
    columns:
      - name: supplier_key
        tests:
          - unique
          - not_null
      - name: supplier_id
        tests:
          - unique
          - not_null
      - name: nation_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_geography')
                field: nation_id

  # ---------------------------------------------------------------------------
  - name: dim_part
    description: "SCD Type 1 part dimension."
    config:
      tags: ['gold', 'dimension', 'scd1', 'part']
    columns:
      - name: part_key
        tests:
          - unique
          - not_null
      - name: part_id
        tests:
          - unique
          - not_null
      - name: brand
        tests:
          - not_null
      - name: retail_price
        tests:
          - positive_value

  # ---------------------------------------------------------------------------
  - name: fct_sales_lineitem
    description: >
      Primary fact — one row per order lineitem. All measures additive except
      discount_rate, tax_rate, and margin_rate (use weighted averages in BI).
      gross_margin is Gold-computed per ADR-02; net_revenue is carried through
      from Silver.
    config:
      tags: ['gold', 'fact', 'tier_1']
    columns:
      - name: sales_lineitem_key
        description: "Surrogate PK. Deterministic hash of (order_id, line_number)."
        tests:
          - unique
          - not_null

      # Dimension FKs
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: supplier_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_supplier')
                field: supplier_key
      - name: part_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_part')
                field: part_key
      - name: ship_geography_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_geography')
                field: geography_key
      - name: bill_geography_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_geography')
                field: geography_key
      - name: order_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

      # Additive measures (tested non-negative)
      - name: quantity
        tests:
          - positive_value
      - name: extended_price
        tests:
          - positive_value
      - name: net_revenue
        tests:
          - positive_value
      - name: supply_cost
        tests:
          - positive_value:
              arguments:
                allow_zero: true

      # gross_margin: not in positive_value — loss-making lines are valid

    tests:
      # Uniqueness at natural grain (also have surrogate key unique above)
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - order_id
              - line_number

      # Business rule: gross_margin = net_revenue - supply_cost, within tolerance
      - dbt_utils.expression_is_true:
          arguments:
            expression: "abs(gross_margin - (net_revenue - supply_cost)) < 0.01"

  # ---------------------------------------------------------------------------
  - name: rpt_customer_profitability_90d
    description: >
      View: one row per customer_id over the last 90 days of fact data.
      Includes active customers (is_lapsed = false) and customers hard-deleted
      after transacting in the window (is_lapsed = true, customer_tier = 'Lapsed').
      Descriptive attributes come from the latest SCD2 version per customer.
    config:
      tags: ['gold', 'rpt', 'customer_profitability']
    columns:
      - name: customer_id
        description: "Natural key. Unique by construction — grain is customer_id, not customer_key."
        tests:
          - unique
          - not_null
      - name: is_lapsed
        description: >
          true when the customer has no current SCD2 version (hard-deleted via
          invalidate_hard_deletes). Descriptive attrs on this row come from
          the most recent historical version and customer_tier = 'Lapsed'.
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  - name: rpt_segment_margin_concentration
    description: >
      View: segment-level margin rollup for concentration / Pareto-style charts.
    config:
      tags: ['gold', 'rpt', 'segment_concentration']
    columns:
      - name: market_segment
        tests:
          - unique
          - not_null
