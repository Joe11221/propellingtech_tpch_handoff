version: 2

# SNOWFLAKE_SAMPLE_DATA.TPCH_SF1 — benchmark wholesale schema. Bronze only reads this; models add metadata (ADR-05).
# Freshness block below is commented out (static data). Generic tests use `arguments:` (dbt 1.10+).

sources:
  - name: tpch_sf1
    description: "TPC-H SF1 in Snowflake sample data; entry point before Bronze."
    config:
      tags: ['source', 'tpch', 'bronze']
    database: snowflake_sample_data
    schema: tpch_sf1

    # loaded_at / thresholds omitted — snapshot data, no native load timestamp on these tables.
    # freshness:
    #   warn_after:  { count: 24, period: hour }
    #   error_after: { count: 48, period: hour }
    # loaded_at_field: _ingested_at

    tables:
      - name: customer
        description: "One row per customer."
        columns:
          - name: c_custkey
            description: "Customer natural key."
            tests:
              - unique
              - not_null
          - name: c_name
            description: "Customer display name."
          - name: c_address
            description: "Street address."
          - name: c_nationkey
            description: "FK to nation."
          - name: c_phone
            description: "Phone (source format)."
          - name: c_acctbal
            description: "Account balance at snapshot; SCD-tracked in Silver."
          - name: c_mktsegment
            description: "Market segment (TPC-H enum)."
          - name: c_comment
            description: "Free-text comment."

      - name: orders
        description: "One row per order."
        columns:
          - name: o_orderkey
            description: "Order natural key."
            tests:
              - unique
              - not_null
          - name: o_custkey
            description: "FK to customer."
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sf1', 'customer')
                    field: c_custkey
          - name: o_orderstatus
            description: "Order status (F=finished, O=open, P=partial)."
          - name: o_totalprice
            description: "Order-level total price."
          - name: o_orderdate
            description: "Date order was placed."
          - name: o_orderpriority
            description: "Priority tier (1-URGENT through 5-LOW)."
          - name: o_clerk
            description: "Clerk who took the order."
          - name: o_shippriority
            description: "Shipping priority integer."
          - name: o_comment
            description: "Free-text comment."

      - name: lineitem
        description: "One row per order line — primary event grain upstream."
        columns:
          - name: l_orderkey
            description: "FK to orders."
            tests:
              - not_null
              - relationships:
                  arguments:
                    to: source('tpch_sf1', 'orders')
                    field: o_orderkey
          - name: l_partkey
            description: "FK to part."
          - name: l_suppkey
            description: "FK to supplier."
          - name: l_linenumber
            description: "Line number within order; natural composite key with l_orderkey."
          - name: l_quantity
            description: "Quantity ordered."
          - name: l_extendedprice
            description: "Extended price (pre-discount)."
          - name: l_discount
            description: "Discount rate (0.00 to 0.10 in TPC-H)."
          - name: l_tax
            description: "Tax rate."
          - name: l_returnflag
            description: "Return status flag (R/A/N)."
          - name: l_linestatus
            description: "Line status (O/F)."
          - name: l_shipdate
            description: "Ship date."
          - name: l_commitdate
            description: "Committed ship date."
          - name: l_receiptdate
            description: "Receipt date."
          - name: l_shipinstruct
            description: "Shipping instructions."
          - name: l_shipmode
            description: "Shipping mode."
          - name: l_comment
            description: "Free-text comment."

      - name: part
        description: "Part catalog."
        columns:
          - name: p_partkey
            description: "Part natural key."
            tests:
              - unique
              - not_null
          - name: p_name
            description: "Part name."
          - name: p_mfgr
            description: "Manufacturer."
          - name: p_brand
            description: "Brand."
          - name: p_type
            description: "Part type."
          - name: p_size
            description: "Size."
          - name: p_container
            description: "Container."
          - name: p_retailprice
            description: "Retail price."
          - name: p_comment
            description: "Free-text comment."

      - name: supplier
        description: "Supplier master."
        columns:
          - name: s_suppkey
            description: "Supplier natural key."
            tests:
              - unique
              - not_null
          - name: s_name
            description: "Supplier name."
          - name: s_address
            description: "Address."
          - name: s_nationkey
            description: "Nation FK."
          - name: s_phone
            description: "Phone."
          - name: s_acctbal
            description: "Account balance."
          - name: s_comment
            description: "Free-text comment."

      - name: partsupp
        description: "Part–supplier bridge; ps_supplycost for margin (ADR-06)."
        columns:
          - name: ps_partkey
            description: "Part FK."
          - name: ps_suppkey
            description: "Supplier FK."
          - name: ps_availqty
            description: "Available quantity."
          - name: ps_supplycost
            description: "Supply cost per unit."
          - name: ps_comment
            description: "Free-text comment."

      - name: nation
        description: "Nation reference."
        columns:
          - name: n_nationkey
            description: "Nation natural key."
            tests:
              - unique
              - not_null
          - name: n_name
            description: "Nation name."
          - name: n_regionkey
            description: "Region FK."
          - name: n_comment
            description: "Free-text comment."

      - name: region
        description: "Region reference."
        columns:
          - name: r_regionkey
            description: "Region natural key."
            tests:
              - unique
              - not_null
          - name: r_name
            description: "Region name."
          - name: r_comment
            description: "Free-text comment."
