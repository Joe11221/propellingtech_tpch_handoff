version: 2

# Bronze (schema bronze_tpch): source shapes kept as-is, light tests, metadata from
# add_ingestion_metadata(). Tables are tpch_* so extra sources can sit beside this one
# (ADR-07, ADR-11). Generic test args use `arguments:` (dbt 1.10+).

models:

  # ---------------------------------------------------------------------------
  - name: tpch_customer
    description: "TPC-H `customer` as landed in Snowflake, plus _ingested_at, _source_system, _batch_id."
    config:
      tags: ['bronze', 'customer']
    columns:
      - name: c_custkey
        description: "Customer natural key. Unique by source contract."
        tests:
          - unique
          - not_null
      - name: c_mktsegment
        description: "Market segment. Enumerated by source; SCD-tracked downstream."
      - name: _ingested_at
        description: "Timestamp at which this row was loaded into Bronze."
        tests:
          - not_null
      - name: _source_system
        description: "Logical name of the source system."
        tests:
          - not_null
      - name: _batch_id
        description: "dbt `invocation_id` for the run that wrote this row."
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  - name: tpch_orders
    description: "TPC-H `orders` — one row per order; keys match lineitem and customer in Silver."
    config:
      tags: ['bronze', 'orders']
    columns:
      - name: o_orderkey
        description: "Order natural key. Unique by source contract."
        tests:
          - unique
          - not_null
      - name: o_custkey
        description: "FK to tpch_customer.c_custkey."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('tpch_customer')
                field: c_custkey

  # ---------------------------------------------------------------------------
  - name: tpch_lineitem
    description: "TPC-H `lineitem` (order, line) grain; ~6M rows at SF1. Main event-level fact upstream."
    config:
      tags: ['bronze', 'lineitem', 'tier_1']
    columns:
      - name: l_orderkey
        description: "FK to tpch_orders.o_orderkey."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('tpch_orders')
                field: o_orderkey
      - name: l_linenumber
        description: "Line number within order. (l_orderkey, l_linenumber) is the natural composite key."
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  - name: tpch_part
    description: "TPC-H `part` — part master for purchasing / partsupp joins."
    config:
      tags: ['bronze', 'part']
    columns:
      - name: p_partkey
        tests:
          - unique
          - not_null

  # ---------------------------------------------------------------------------
  - name: tpch_supplier
    description: "TPC-H `supplier` with nation key; no extra transforms here."
    config:
      tags: ['bronze', 'supplier']
    columns:
      - name: s_suppkey
        tests:
          - unique
          - not_null

  # ---------------------------------------------------------------------------
  - name: tpch_partsupp
    description: "TPC-H `partsupp` — `ps_supplycost` is the only per-unit cost TPC-H gives you; needed for margin (ADR-06)."
    config:
      tags: ['bronze', 'partsupp']
    columns:
      - name: ps_partkey
        tests:
          - not_null
      - name: ps_suppkey
        tests:
          - not_null

  # ---------------------------------------------------------------------------
  - name: tpch_nation
    description: "TPC-H `nation` reference; pairs with `region` for geography."
    config:
      tags: ['bronze', 'nation', 'reference']
    columns:
      - name: n_nationkey
        tests:
          - unique
          - not_null

  # ---------------------------------------------------------------------------
  - name: tpch_region
    description: "TPC-H `region` reference, five rows at SF1."
    config:
      tags: ['bronze', 'region', 'reference']
    columns:
      - name: r_regionkey
        tests:
          - unique
          - not_null
