version: 2

# snap_customer_scd2 — check strategy (no reliable updated_at on TPC-H). ADR-04.

snapshots:

  - name: snap_customer_scd2
    description: >
      SCD Type 2 history of TPC-H customers from tpch_customer. strategy: check on
      segment, balance, nation, and address; invalidate_hard_deletes expires removed keys.
      Target schema silver_customer; Silver customer and Gold dims read forward.
    config:
      tags:
        - silver
        - customer
        - scd2
        - snapshot
        - 'AD Group: Customer'
    columns:
      - name: c_custkey
        description: "Customer natural key; snapshot unique_key."
      - name: c_name
        description: "Customer name at this version."
      - name: c_address
        description: "Address; in check_cols."
      - name: c_nationkey
        description: "Nation FK; in check_cols."
      - name: c_phone
        description: "Phone (source format)."
      - name: c_acctbal
        description: "Account balance; in check_cols."
      - name: c_mktsegment
        description: "Market segment; in check_cols."
      - name: c_comment
        description: "Free-text comment (not a check column)."
      - name: dbt_scd_id
        description: "dbt surrogate for snapshot row version."
      - name: dbt_updated_at
        description: "When dbt last wrote this snapshot row."
      - name: dbt_valid_from
        description: "Start of effective window for this version."
      - name: dbt_valid_to
        description: "End of effective window; null = current open version."
