name: 'propellingtech_tpch'
version: '1.0.0'
config-version: 2

profile: 'propellingtech_tpch'

model-paths:    ["models"]
analysis-paths: ["analyses"]
test-paths:     ["tests"]
seed-paths:     ["seeds"]
macro-paths:    ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  source_system: 'SNOWFLAKE_SAMPLE_DATA.TPCH_SF1'

# Per-layer schema and materialization — ADR-09, ADR-11.
models:
  propellingtech_tpch:

    bronze:
      +materialized: table
      +tags: ['bronze', 'AD Group: Bronze User']
      +meta:
        layer: 'bronze'
        purpose: 'Raw TPC-H tables + load metadata'
      tpch:
        +schema: bronze_tpch
        +tags: ['bronze', 'tpch', 'AD Group: tpch_user']

    silver:
      +materialized: table
      +tags: ['silver', 'AD Group: Silver User']
      +meta:
        layer: 'silver'
        purpose: 'Typed entities, business rules, FK checks'
      customer:
        +schema: silver_customer
        +tags: ['silver', 'customer', 'AD Group: Customer']
      sales:
        +schema: silver_sales
        +tags: ['silver', 'sales', 'AD Group: Sales']
      purchasing:
        +schema: silver_purchasing
        +tags: ['silver', 'purchasing', 'AD Group: Purchasing']
      geography:
        +schema: silver_geography
        +tags: ['silver', 'geography']

    gold:
      +materialized: table
      +tags: ['gold', 'AD Group: Gold User']
      +meta:
        layer: 'gold'
        purpose: 'Star schema for finance analytics'
      profitability:
        +schema: gold_profitability
        +tags: ['gold', 'profitability', 'AD Group: Profitability']

snapshots:
  propellingtech_tpch:
    +target_schema: silver_customer
    +strategy: check
    +invalidate_hard_deletes: true

tests:
  +store_failures: true
  +severity: error
