
name: 'propellingtech_tpch'
version: '1.0.0'

profile: 'propellingtech_tpch'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

vars:
  source_system: 'SNOWFLAKE_SAMPLE_DATA.TPCH_SF1'
# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models


models:
  propellingtech_tpch:
    bronze:
      +materialized: table
      +schema: bronze
      +tags: ['bronze']
      +meta:
        layer: 'bronze'
        purpose: 'Source-faithful raw ingestion with ingestion metadata'
    silver:
      +materialized: table
      +schema: silver
      +tags: ['silver']
      +meta:
        layer: 'silver'
        purpose: 'Cleansed, conformed, business-rule-applied entities'
    gold:
      +schema: gold
      +tags: ['gold']
      +meta:
        layer: 'gold'
        purpose: 'Consumer-ready dimensional model for Commercial Finance'


# Snapshots: SCD Type 2 lives in the silver schema alongside conformed entities.
snapshots:
  propellingtech_tpch:
    +target_schema: silver
    +strategy: timestamp
    +invalidate_hard_deletes: true



# Seeds: dim_date lives in silver since it's a service table, but also will be exposed as a view in the gold schema to be consumed by business users.

seeds:
  propellingtech_tpch:
    +schema: silver
    +quote_columns: false

# Global test severity: warnings don't fail the build, errors do.

tests:
  +store_failures: true
  +severity: error